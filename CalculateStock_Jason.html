<!DOCTYPE html>
<html lang="en">

<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

<head>
    <meta charset="UTF-8">
    <title>Stock Profit Calculator</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        body { font-family: Arial, sans-serif; padding: 10px; }
        h1 {
          font-size: 65px;
          color:rgb(11, 70, 232);
          margin-bottom: 10px;
        }

        .fee-box {
          font-size: 50px;
          font-weight: bold;
          color: #080100;
          display: inline-block; /* 讓寬度設定生效 */
          min-width: 340px;      /* 預留空間給大數字 */
          text-align: right;     /* 數字靠右對齊比較美觀 */
        }
        .result-box {
          font-size: 50px;
          font-weight: bold;
          color: #080100;
          display: inline-block; /* 讓寬度設定生效 */
          min-width: 340px;      /* 預留空間給大數字 */
          text-align: right;     /* 數字靠右對齊比較美觀 */
        }
        .profit-box {
          font-size: 50px;
          font-weight: bold;
          color: #080100;
        }
        .rich-image {
          width: 100%;          /* 寬度隨容器調整 */
          max-width: 600px;     /* 最大寬度限制 */
          border-radius: 15px;  /* 圓角效果，跟你的輸入框風格一致 */
          margin-top: 20px;
          border: 3px solid #ccc;
        }
    </style>
</head>

<body>
  <h1>Profit & Loss Calculator</h1>

  <style>
    /* 針對所有文字輸入框 */
    input[type="text"] {
        box-sizing: border-box;   /* 強制寬度包含 padding 和 border */
        width: 250px;             /* 寬度 */
        height: auto;             /* 高度 */
        padding-left: 20px;
        padding-right: 20px;      /* 內文字與邊框的距離，增加點擊感 */
        padding-top: 5px;         /* 上內距 */
        padding-bottom: 5px;      /* 下內距 */
        font-size: 48px;          /* 讓輸入的文字大一點 */
        border: 3px solid #ccc; /* 設定邊框 */
        border-radius: 8px;       /* 增加圓角讓視覺更柔和 */
        text-align: right;        /* 數字靠右對齊比較美觀 */
    }
  </style>

  <style>
    .label-text {
      font-size: 50px;    /* 字體大小 */
      font-weight: bold;  /* 加粗 */
      color: #080100;   /* 字體顏色 (例如紅色) */
    }
  </style>

  <style>
    .email-text {
      font-size: 36px;      /* 字體大小 */
      font-weight: normal;
      color: #080100;     /* 字體顏色 (例如紅色) */
    }
  </style>

  <style>
    /* 使用 # 來指定 id */
    #sumButtonId {
      font-size: 60px;              /* 字體大小 */
      font-weight: bold;            /* 加粗 */
      padding: 0px 10px;            /* 內距：第一個值是上下，第二個值是左右 */
      min-width: 60px;              /* 也可以直接指定最小寬度 */
      margin-right: 60px;
      cursor: pointer;              /* 滑鼠游標變手指 */
      background-color: #f0f0f0;  /* 背景顏色 */
      border: 2px solid #333;     /* 邊框 */
      border-radius: 10px;          /* 圓角 */
    }
  
    /* 滑鼠移上去時的視覺效果 */
    #sumButtonId:hover {
      background-color: #ddd;
    }
  </style>

  <style>
    #author-info {
      font-size: 50px;          /* 設定字體大小 */
      font-weight: bold;        /* 加粗 */
      color:rgb(11, 70, 232); /* 設定顏色 (灰度) */
      margin-top: 0px;          /* 與上方內容保持距離 */
      font-style: italic;       /* (選填) 斜體增加質感 */
      text-align: left;         /* (選填) 靠右對齊 */
  }
  </style>

  <div style="display: flex; align-items: flex-start;">
    <div style="width: 520px;">
      <p>
        <span class = "label-text">買價　</span>
        <input type = "text" id = "Bid_Id">
        <span class = "label-text"> 元</span>
      </p>

      <p>
        <span class = "label-text">賣價　</span>
        <input type = "text" id = "Ask_Id">
        <span class = "label-text"> 元</span>
      </p>

      <p>
        <span class = "label-text">股數　</span>
        <input type = "text" id = "Share_Id" value = "1000">
        <span class = "label-text"> 股</span>
      </p>

      <p>
        <span class = "label-text">證交稅</span>
        <input type = "text" id = "STT_Id" value = "0.3">
        <span class = "label-text"> %</span>
      </p>

      <p>
        <span class = "label-text">手續費</span>
        <input type = "text" id = "FeeDiscount_Id" value = "28">
        <span class = "label-text"> %</span>
      </p>

      <p>
        <span class = "fee-box" id = "feeId"> 0 </span>
        <span class = "label-text"> 元</span>
      </p>

      <p>
        <span class = "label-text">P&L:</span>
        <span class = "result-box" id = "resultId"> 0 </span>
        <span class = "label-text" id = "unitId"> 元</span>
      </p>
  
      <p>
        <span class="result-box" id = "percentId" style="margin-left: 170px;"> 0.00 %</span>
      </p>

      <p>
        <span class = "email-text">Email: jason28m@yahoo.com</span>
      </p>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; margin-left: 0px;">
        <img src="wealth.png" alt="Rich" style="width: 300px; border-radius: 10px; border: none; margin-bottom: 10px;">
        <button id="sumButtonId" style="margin-right: 0;">SUM</button>
    </div>
  </div>

  <script>
  document.getElementById('sumButtonId').onclick = function() {
    // 選取輸入欄位的 DOM 並宣告變數名，用 value 帶出輸入欄的值。
    const Bid = parseFloat(document.getElementById('Bid_Id').value) || 0;
    const Ask = parseFloat(document.getElementById('Ask_Id').value) || 0;
    const Share = parseInt(document.getElementById('Share_Id').value) || 0;
    const STT = parseFloat(document.getElementById('STT_Id').value) || 0;
    const FeeDiscount = parseInt(document.getElementById('FeeDiscount_Id').value) || 0;
  
    // 再用一個變數儲存金額加總
    //const fee = parseFloat((Bid + Ask) * 1.425 * (FeeDiscount / 100));
    //const fee = parseFloat((Bid + Ask) * 0.001425 * Share * (FeeDiscount / 100));
    const fee = parseFloat((Bid + Ask) * Share * 0.001425 * (FeeDiscount / 100));
    //const sum = parseFloat((Ask - Bid - Ask * 0.003) * Share - fee);
    const sum = parseFloat((Ask - Bid - ((Bid + Ask) * 0.001425 * (FeeDiscount / 100)) - (Ask * (STT / 100))) * Share);
    //const percent = parseFloat(((Ask - Bid -Ask * 0.004425 - Bid * 0.001425) / Bid) * 100);
    const percent = parseFloat((sum / (Bid * Share)) * 100);

    // 將結果格式化（加上千分位與顏色區分）
    const displayFee = document.getElementById('feeId');
    const displayResult = document.getElementById('resultId');
    const displayUnit = document.getElementById('unitId'); // 抓取「元」
    const displayPercent = document.getElementById('percentId');
   
    // 使用 toLocaleString 並透過參數設定小數點位數與千分位
    // minimumFractionDigits: 2 (確保至少顯示兩位小數)
    // maximumFractionDigits: 2 (最多顯示兩位小數)
    displayFee.textContent = fee.toLocaleString('en-US', {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
    });

    displayResult.textContent = sum.toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
    });
  
    // 簡單的視覺回饋：獲利為正顯示紅色，負值顯示綠色 (美股通常綠漲紅跌)
    // display.style.color = sum >= 0 ? "#e74c3c" : "#27ae60";
  
    // 更新百分比顯示 (顯示到小數點後兩位)
    displayPercent.textContent = `${percent.toFixed(2)} %`;
  
    // 統一顏色判斷 (簡單的視覺回饋：獲利為正顯示紅色，負值顯示綠色。)
    const color = sum >= 0 ? "#e74c3c" : "#27ae60";
    displayResult.style.color = color;
    displayUnit.style.color = color; // 讓「元」也變色
    displayPercent.style.color = color;

  }
  </script>

  <div id="author-info">Jason Lin (May 4, 2026)</div>
</body>
</html>
